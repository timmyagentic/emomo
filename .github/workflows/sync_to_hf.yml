name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/sync_to_hf.yml'
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Split backend/ subtree
        # Reduce the monorepo to just the contents of backend/, so the HF Space
        # sees a flat Go project layout (Dockerfile / configs / scripts at root)
        # exactly like before the monorepo migration.
        run: |
          git subtree split --prefix=backend -b hf-backend
      - name: Push backend subtree to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          HF_REPO="https://TINGJUNN:$HF_TOKEN@huggingface.co/spaces/TINGJUNN/emomo"
          # Force-push the split subtree as the HF Space's main branch.
          # We force-push because the subtree split history is disjoint from
          # whatever the Space might already have; the Space is a deployment
          # mirror, not a development fork.
          git push "$HF_REPO" hf-backend:main --force
