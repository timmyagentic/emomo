name: Mobile CI

on:
  pull_request:
    paths:
      - 'backend/proto/**'
      - 'mobile/**'
      - 'scripts/check-mobile-ci.sh'
      - '.github/workflows/mobile.yml'
  push:
    branches: [main]
    paths:
      - 'backend/proto/**'
      - 'mobile/**'
      - 'scripts/check-mobile-ci.sh'
      - '.github/workflows/mobile.yml'
  workflow_dispatch:
    inputs:
      build_android_preview:
        description: 'Build the Android preview APK with EAS'
        required: true
        default: true
        type: boolean
      build_ios_simulator:
        description: 'Build the iOS simulator app with EAS'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  mobile-checks:
    name: Mobile checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Regenerate mobile protobuf DTOs
        working-directory: mobile
        run: npm run gen

      - name: Verify generated mobile DTOs are committed
        working-directory: mobile
        run: git diff --exit-code -- gen

      - name: Run mobile tests
        working-directory: mobile
        run: npm test -- --runInBand

      - name: Typecheck mobile app
        working-directory: mobile
        run: npm run typecheck

      - name: Lint mobile app
        working-directory: mobile
        run: npm run lint

      - name: Run Expo doctor
        working-directory: mobile
        run: npx expo-doctor

      - name: Check mobile CI wiring
        run: bash scripts/check-mobile-ci.sh

  android-preview-apk:
    name: Android preview APK
    runs-on: ubuntu-latest
    needs: mobile-checks
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_android_preview) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Expo configuration
        id: expo-config
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          missing=""
          if [ -z "$EXPO_TOKEN" ]; then
            missing="$missing EXPO_TOKEN"
          fi
          if [ -z "$EXPO_PROJECT_ID" ]; then
            missing="$missing EXPO_PROJECT_ID"
          fi
          if [ -n "$missing" ]; then
            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              echo "::error title=Missing Expo configuration::Set repository secrets before running Android APK builds:$missing"
              exit 1
            fi
            echo "::notice title=Skipping Android preview APK::Missing repository secrets:$missing"
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.expo-config.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        if: steps.expo-config.outputs.configured == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.expo-config.outputs.configured == 'true'
        working-directory: mobile
        run: npm ci

      - name: Regenerate mobile protobuf DTOs
        if: steps.expo-config.outputs.configured == 'true'
        working-directory: mobile
        run: npm run gen

      - name: Link EAS project
        if: steps.expo-config.outputs.configured == 'true'
        working-directory: mobile
        env:
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
        run: eas init --id "$EXPO_PROJECT_ID" --non-interactive

      - name: Build Android preview APK
        if: steps.expo-config.outputs.configured == 'true'
        id: eas-build
        working-directory: mobile
        run: |
          set -euo pipefail
          mkdir -p ../artifacts
          eas build --platform android --profile preview --non-interactive --wait --json > ../artifacts/eas-build.json
          node <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('../artifacts/eas-build.json', 'utf8').trim();
          const parsed = JSON.parse(raw);
          const builds = Array.isArray(parsed) ? parsed : [parsed];
          const build = builds.find((item) => String(item.platform).toUpperCase() === 'ANDROID') || builds[0];
          if (!build?.id) {
            throw new Error(`Could not find Android EAS build id in ${raw}`);
          }
          const buildUrl = build.artifacts?.buildUrl || build.artifactUrl || build.buildUrl || '';
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `build_id=${build.id}\n`);
          if (buildUrl) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `build_url=${buildUrl}\n`);
          }
          NODE

      - name: Download Android APK
        if: steps.expo-config.outputs.configured == 'true'
        working-directory: mobile
        env:
          BUILD_ID: ${{ steps.eas-build.outputs.build_id }}
          BUILD_URL: ${{ steps.eas-build.outputs.build_url }}
        run: |
          set -euo pipefail
          mkdir -p ../artifacts/android
          if [ -n "${BUILD_URL:-}" ]; then
            curl --fail --location "$BUILD_URL" --output ../artifacts/android/emomo-preview.apk
          else
            eas build:download --build-id "$BUILD_ID" --non-interactive
            find . -maxdepth 1 -type f -name '*.apk' -exec mv {} ../artifacts/android/ \;
          fi
          test -n "$(find ../artifacts/android -maxdepth 1 -type f -name '*.apk' -print -quit)"
          ls -lh ../artifacts/android

      - name: Upload Android APK artifact
        if: steps.expo-config.outputs.configured == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: emomo-android-preview-apk-${{ github.run_number }}
          path: artifacts/android/*.apk
          if-no-files-found: error
          retention-days: 14

  ios-simulator:
    name: iOS simulator app
    runs-on: ubuntu-latest
    needs: mobile-checks
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_ios_simulator) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Expo configuration
        id: expo-config
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          missing=""
          if [ -z "$EXPO_TOKEN" ]; then
            missing="$missing EXPO_TOKEN"
          fi
          if [ -z "$EXPO_PROJECT_ID" ]; then
            missing="$missing EXPO_PROJECT_ID"
          fi
          if [ -n "$missing" ]; then
            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              echo "::error title=Missing Expo configuration::Set repository secrets before running iOS simulator builds:$missing"
              exit 1
            fi
            echo "::notice title=Skipping iOS simulator app::Missing repository secrets:$missing"
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.expo-config.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        if: steps.expo-config.outputs.configured == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.expo-config.outputs.configured == 'true'
        working-directory: mobile
        run: npm ci

      - name: Regenerate mobile protobuf DTOs
        if: steps.expo-config.outputs.configured == 'true'
        working-directory: mobile
        run: npm run gen

      - name: Link EAS project
        if: steps.expo-config.outputs.configured == 'true'
        working-directory: mobile
        env:
          EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
        run: eas init --id "$EXPO_PROJECT_ID" --non-interactive

      - name: Build iOS simulator app
        if: steps.expo-config.outputs.configured == 'true'
        id: eas-build
        working-directory: mobile
        run: |
          set -euo pipefail
          mkdir -p ../artifacts
          eas build --platform ios --profile ios-simulator --non-interactive --wait --json > ../artifacts/eas-ios-simulator-build.json
          node <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('../artifacts/eas-ios-simulator-build.json', 'utf8').trim();
          const parsed = JSON.parse(raw);
          const builds = Array.isArray(parsed) ? parsed : [parsed];
          const build = builds.find((item) => String(item.platform).toUpperCase() === 'IOS') || builds[0];
          if (!build?.id) {
            throw new Error(`Could not find iOS EAS build id in ${raw}`);
          }
          const buildUrl = build.artifacts?.buildUrl || build.artifactUrl || build.buildUrl || '';
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `build_id=${build.id}\n`);
          if (buildUrl) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `build_url=${buildUrl}\n`);
          }
          NODE

      - name: Download iOS simulator artifact
        if: steps.expo-config.outputs.configured == 'true'
        working-directory: mobile
        env:
          BUILD_ID: ${{ steps.eas-build.outputs.build_id }}
          BUILD_URL: ${{ steps.eas-build.outputs.build_url }}
        run: |
          set -euo pipefail
          mkdir -p ../artifacts/ios
          if [ -n "${BUILD_URL:-}" ]; then
            curl --fail --location "$BUILD_URL" --output ../artifacts/ios/emomo-ios-simulator.tar.gz
          else
            eas build:download --build-id "$BUILD_ID" --non-interactive
            find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} ../artifacts/ios/ \;
          fi
          test -n "$(find ../artifacts/ios -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print -quit)"
          ls -lh ../artifacts/ios

      - name: Upload iOS simulator artifact
        if: steps.expo-config.outputs.configured == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: emomo-ios-simulator-${{ github.run_number }}
          path: |
            artifacts/ios/*.tar.gz
            artifacts/ios/*.zip
          if-no-files-found: error
          retention-days: 14
