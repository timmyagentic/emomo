server:
  port: 8080
  mode: debug
  cors:
    allow_all_origins: true
    allowed_origins: []
  public_api:
    enabled: true
    rate_limit_enabled: true
    requests_per_minute: 60
    burst: 20
    body_limit_bytes: 16384
    search_top_k_max: 50
    search_query_max_runes: 160
    list_limit_max: 60

database:
  driver: postgres
  path: ./data/memes.db
  port: 6543
  user: postgres
  dbname: emomo
  sslmode: disable
  auto_migrate: true
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 1h

qdrant:
  port: 6334
  collection: emomo  # Default collection name (fallback)

storage:
  type: r2
  # endpoint: set via STORAGE_ENDPOINT env var
  endpoint: ""
  use_ssl: true
  bucket: emomo
  region: auto
  # public_url: set via STORAGE_PUBLIC_URL env var; required when document_mode=image needs public image URLs
  public_url: ""

vlm:
  provider: openai
  # model: set via VLM_MODEL env var
  model: ""
  base_url: https://openrouter.ai/api/v1

# Embedding configurations (list format)
# Each embedding can have its own provider, model, and Qdrant collection
embeddings:
  - name: qwen3vl_image
    provider: siliconflow
    model: Qwen/Qwen3-VL-Embedding-8B
    api_key_env: SILICONFLOW_API_KEY
    base_url_env: SILICONFLOW_BASE_URL
    document_mode: image
    dimensions: 1024
    collection: meme_image_qwen3vl_1024

  - name: qwen3vl_caption
    provider: siliconflow
    model: Qwen/Qwen3-VL-Embedding-8B
    api_key_env: SILICONFLOW_API_KEY
    base_url_env: SILICONFLOW_BASE_URL
    document_mode: text
    dimensions: 1024
    collection: meme_caption_qwen3vl_1024
    is_default: true

ingest:
  workers: 5
  batch_size: 10
  retry_count: 3

search:
  score_threshold: 0.35
  default_profile: qwen3vl
  profiles:
    - name: qwen3vl
      image_embedding: qwen3vl_image
      caption_embedding: qwen3vl_caption
      is_default: true
  retrieval:
    image_top_k: 100
    caption_top_k: 100
    final_top_k: 100
    weights:
      image: 0.60
      caption: 0.30
      keyword: 0.10
  query_expansion:
    enabled: true
    # model: set via QUERY_EXPANSION_MODEL env var
    model: ""
    # api_key: set via QUERY_EXPANSION_API_KEY env var (optional, defaults to VLM's OPENAI_API_KEY)
    api_key: ""
    # base_url: set via QUERY_EXPANSION_BASE_URL env var (optional, defaults to VLM's OPENAI_BASE_URL)
    base_url: ""
  agentic:
    enabled: false
    # planner_model/reranker_model default to query_expansion.model, then VLM_MODEL
    planner_model: ""
    reranker_model: ""
    planner_timeout: 8s
    reranker_timeout: 10s
    rerank_top_k: 40
    fallback_on_error: true

sources:
  localdir:
    enabled: true
    root_path: ./data/memes
    source_id: localdir
    manifest_path: ""
    queue_path: ""
